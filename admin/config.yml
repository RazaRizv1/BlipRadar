backend:
  name: github
  repo: Lumos-Core/BlipRadar
  branch: main

media_folder: assets/uploads
public_folder: /assets/uploads

collections:
  - name: site
    label: blipradar
    files:
      - name: data
        label: Tools & categories
        file: data.json
        editor:
          preview: false
        fields:
          - label: Categories
            name: categories
            widget: list
            collapsed: true
            summary: '{{fields.label}}'
            fields:
              - {label: Slug, name: slug, widget: string}
              - {label: Label, name: label, widget: string}
              - {label: Live, name: live, widget: boolean, default: true}
          - label: 'Payment addresses (where listing payments are received)'
            name: payments
            widget: object
            collapsed: true
            fields:
              - {label: 'Bitcoin (BTC) address', name: Bitcoin, widget: string, required: false}
              - {label: 'Ethereum (ETH) address  — your 0x... wallet', name: Ethereum, widget: string, required: false}
              - {label: 'Solana (SOL) address', name: Solana, widget: string, required: false}
              - {label: 'USDC on Base address  — same 0x... wallet works', name: Base, widget: string, required: false}
              - {label: 'USDC on Stellar address', name: Stellar, widget: string, required: false}
          - label: 'Coding tools'
            name: coding
            widget: list
            collapsed: true
            summary: '{{fields.name}}  ·  {{fields.score}}'
            fields:
              - {label: Name, name: name, widget: string}
              - {label: 'Affiliate / visit URL  (the link behind the button)', name: url, widget: string}
              - {label: 'Is this an affiliate link?', name: affiliate, widget: boolean, default: false}
              - {label: 'Score (leave blank = Not yet rated)', name: score, widget: number, value_type: float, step: 0.1, min: 0, max: 10, required: false}
              - {label: Rank, name: rank, widget: number, value_type: int, required: false}
              - {label: Momentum, name: mom, widget: number, value_type: float, step: 0.1, required: false}
              - {label: 'Subscores (Output, Value, Ease, Reliability, Ecosystem, Momentum) — leave a value blank/omit for Not-yet-known', name: s, widget: list, required: false, field: {label: value, name: v, widget: number, value_type: float, step: 0.1}}
              - {label: Description, name: desc, widget: text}
              - {label: Best for, name: bestFor, widget: string, required: false}
              - {label: Price, name: price, widget: string, required: false}
              - {label: Type, name: type, widget: string, required: false}
              - {label: 'Domain (for the logo)', name: domain, widget: string}
              - {label: Tags, name: cats, widget: list, required: false, field: {label: tag, name: t, widget: string}}
              - {label: 'Letter (logo fallback)', name: letter, widget: string, required: false}
              - {label: 'Internal page link', name: link, widget: string, required: false, default: '#'}
              - {label: 'Listed on (drives the New listings sort)', name: added, widget: datetime, required: false, time_format: false, date_format: 'YYYY-MM-DD'}
              - {label: 'Interest trend (monthly points, 0-100)', name: trend, widget: list, required: false, fields: [{label: 'Month (YYYY-MM)', name: m, widget: string}, {label: 'Value 0-100', name: v, widget: number, value_type: float}]}
